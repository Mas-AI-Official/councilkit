<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="titleGrad" x1="130" y1="150" x2="760" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E2E8F0"/>
      <stop offset="0.45" stop-color="#93C5FD"/>
      <stop offset="1" stop-color="#A7F3D0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="#0B1220"/>
  <rect x="70" y="70" width="1140" height="500" rx="24" fill="#111827" stroke="#334155"/>

  <text x="130" y="212" font-family="Segoe UI, Arial, sans-serif" font-size="90" font-weight="800">
    <tspan fill="#2563EB">Council</tspan><tspan fill="#10B981">Kit</tspan>
  </text>

  <text x="130" y="286" fill="url(#titleGrad)" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700">One prompt. Many models. One answer.</text>
  <text x="130" y="344" fill="#93C5FD" font-family="Segoe UI, Arial, sans-serif" font-size="32">Bring your own host. Bring your own workers.</text>
  <text x="130" y="392" fill="#34D399" font-family="Segoe UI, Arial, sans-serif" font-size="32">Use your subscriptions first. API optional.</text>

  <rect x="130" y="434" width="1020" height="88" rx="12" fill="#0F172A" stroke="#1E293B"/>
  <text x="158" y="472" fill="#CBD5E1" font-family="Consolas, Menlo, monospace" font-size="24">Host -> CouncilKit Core -> Discovery + Routing -> Workers</text>
  <text x="158" y="504" fill="#A7F3D0" font-family="Consolas, Menlo, monospace" font-size="24">Unified Answer + Disagreements + Next Checks</text>
</svg>
