<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="titleGrad" x1="130" y1="150" x2="840" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E2E8F0"/>
      <stop offset="0.5" stop-color="#93C5FD"/>
      <stop offset="1" stop-color="#A7F3D0"/>
    </linearGradient>
    <linearGradient id="cardShine" x1="0" y1="0" x2="260" y2="260" gradientUnits="userSpaceOnUse" gradientTransform="translate(-1280 0)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
      <animateTransform
        attributeName="gradientTransform"
        type="translate"
        from="-1280 0"
        to="1280 0"
        dur="9s"
        repeatCount="indefinite" />
    </linearGradient>
  </defs>

  <rect width="1280" height="640" fill="#0B1220"/>
  <rect x="70" y="70" width="1140" height="500" rx="24" fill="#111827" stroke="#334155"/>

  <text x="130" y="212" font-family="Segoe UI, Arial, sans-serif" font-size="90" font-weight="800">
    <tspan fill="#2563EB">Council</tspan><tspan fill="#10B981">Kit</tspan>
  </text>
  <text x="130" y="212" fill="url(#cardShine)" font-family="Segoe UI, Arial, sans-serif" font-size="90" font-weight="800">CouncilKit</text>

  <text x="130" y="286" fill="url(#titleGrad)" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700">One prompt. Many models. One answer.</text>
  <text x="130" y="340" fill="#93C5FD" font-family="Segoe UI, Arial, sans-serif" font-size="30">Host-agnostic model council for MCP, CLI, and optional API workers.</text>
  <text x="130" y="386" fill="#34D399" font-family="Segoe UI, Arial, sans-serif" font-size="30">Use your subscriptions first. Add APIs only when you want or need them.</text>

  <rect x="130" y="434" width="1020" height="88" rx="12" fill="#0F172A" stroke="#1E293B"/>
  <text x="158" y="472" fill="#CBD5E1" font-family="Consolas, Menlo, monospace" font-size="22">Host -> CouncilKit Core -> MCP / CLI / optional API Workers</text>
  <text x="158" y="504" fill="#A7F3D0" font-family="Consolas, Menlo, monospace" font-size="22">Unified Answer + Disagreements + Next Checks</text>
</svg>
